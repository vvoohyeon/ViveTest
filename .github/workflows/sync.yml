name: Sync Variant Registry

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run sync
        run: npm run sync
        env:
          GOOGLE_SHEETS_SA_KEY: ${{ secrets.GOOGLE_SHEETS_SA_KEY }}
          GOOGLE_SHEETS_ID_LANDING: ${{ secrets.GOOGLE_SHEETS_ID_LANDING }}
          GOOGLE_SHEETS_ID_QUESTIONS: ${{ secrets.GOOGLE_SHEETS_ID_QUESTIONS }}
        continue-on-error: false
